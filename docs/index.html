<html>
  <head>
    <title>ink — community network</title>
    <script src="main.js"></script>
    <meta name="viewport" content="width=device-width, user-scalable=no" />
    <meta name="theme-color" content="#113cfc" />
  </head>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 0;
      color: #fff;
    }

    main {
      position: relative;
      width: 100vw;
      height: 100vh;
      letter-spacing: 1px;
    }

    h4 {
      font-weight: 200;
    }

    h4 span {
      font-size: 0.6rem;
    }

    .content {
      position: absolute;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #gradient-canvas {
      --gradient-color-1: #e6e6e6;
      --gradient-color-2: #113cfc;
      --gradient-color-3: #f2f2f2;
      --gradient-color-4: #1597e5;

      width: 100vw;
      height: 100vh;
    }
  </style>
  <body>
    <main>
      <div class="content">
        <h4>ink<span>.community</span></h4>
      </div>
      <canvas id="gradient-canvas"></canvas>
    </main>
    <script>
      const gradient = new Gradient();
      gradient.initGradient("#gradient-canvas");
    </script>
  </body>
</html>
